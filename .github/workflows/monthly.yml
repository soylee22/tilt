name: Monthly Tilt run

on:
  schedule:
    # 1st of each month at 06:23 UTC — picks the previous trading day's
    # close (last day of previous month). Off-hour minute reduces collision
    # with other GHA crons.
    - cron: "23 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tilt-monthly
  cancel-in-progress: false

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run monthly job
        run: python scripts/run_monthly.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit data + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.parquet data/history.jsonl docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "monthly: tilt run $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $attempt), rebasing..."
            git pull --rebase origin main || git rebase --abort
            sleep 3
          done
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: run-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
